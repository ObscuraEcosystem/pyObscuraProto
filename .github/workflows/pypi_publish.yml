name: Python Package

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-26-intel
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install cibuildwheel
        run: pip install 'cibuildwheel>=2.16,<3'
        env:
          PIP_REQUIRE_VIRTUALENV: false
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD_VERBOSITY: 2
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: |
            set -e
            echo "=== Wheel libraries ==="
            unzip -l {wheel} | grep '\.dylib\|\.so'
            echo "=== delocate-listdeps ==="
            delocate-listdeps {wheel}
            echo "=== delocate-wheel ==="
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=26
          CIBW_ENVIRONMENT_WINDOWS: |
            CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          CIBW_BEFORE_BUILD_MACOS: pip install --upgrade delocate
          CIBW_BEFORE_BUILD_WINDOWS: |
            echo "=== CMake version ==="
            cmake --version
            echo "=== Generator platform ==="
            echo CMAKE_GENERATOR_PLATFORM=%CMAKE_GENERATOR_PLATFORM%
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_linux_aarch64:
    name: Build wheels (linux-aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Install cibuildwheel
        run: pip install 'cibuildwheel>=2.16,<3'
        env:
          PIP_REQUIRE_VIRTUALENV: false
      - name: Build aarch64 wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS_LINUX: aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: ./wheelhouse/*.whl

  build_windows_arm64:
    name: Build wheels (windows-arm64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Set up MSVC ARM64 toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64_arm64
      - name: Install cibuildwheel
        run: pip install 'cibuildwheel>=2.16,<3'
      - name: Build ARM64 wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD_VERBOSITY: 2
          CIBW_ARCHS_WINDOWS: ARM64
          CIBW_ENVIRONMENT_WINDOWS: |
            CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
            VCPKG_TARGET_TRIPLET=arm64-windows
          CIBW_BEFORE_BUILD_WINDOWS: |
            echo "=== CMake version ==="
            cmake --version
            echo "=== Environment ==="
            set | findstr "CMAKE"
            echo "=== Generator platform ==="
            echo CMAKE_GENERATOR_PLATFORM=%CMAKE_GENERATOR_PLATFORM%
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-arm64
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Build sdist
        run: |
          pip install build
          SETUPTOOLS_SCM_PRETEND_VERSION="${GITHUB_REF_NAME#v}" python -m build --sdist
        env:
          PIP_REQUIRE_VIRTUALENV: false
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Release & Publish to PyPI
    environment:
      name: pypi
      url: https://pypi.org/project/pyObscuraProto/
    permissions:
      id-token: write
      contents: write
    needs:
      - build_wheels
      - build_linux_aarch64
      - build_windows_arm64
      - build_sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
